apiVersion: apps/v1
kind: Deployment
metadata:
  name: badminton-rotator
  labels:
    app: badminton-rotator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: badminton-rotator
  template:
    metadata:
      labels:
        app: badminton-rotator
    spec:
      containers:
      - name: web
        image: docker.io/venuvgp19/badminton_rotator:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: badminton-rotator-service
spec:
  type: NodePort
  selector:
    app: badminton-rotator
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30080
